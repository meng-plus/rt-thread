# Automation utest run script for the QEMU platform
# Generate the corresponding config configuration for CI based on the configuration file under .github/utest/configs.

name: utest_auto_run

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/utest_auto_run.yml'
      - '.github/utest/configs/**'
      - 'Kconfig'
      - 'components/utilities/utest/Kconfig'
      - 'bsp/qemu-vexpress-a9/**'
      - 'bsp/qemu-virt64-aarch64/**'
      - 'bsp/qemu-virt64-riscv/**'
      - 'bsp/xuantie/virt64/c906/**'
      - 'components/**'
      - 'examples/utest/**'
      - 'include/**'
      - 'libcpu/**'
      - 'src/**'
      - 'tools/**'
      - '!**/README.md'
      - '!**/README_zh.md'
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/utest_auto_run.yml'
      - '.github/utest/configs/**'
      - 'Kconfig'
      - 'components/utilities/utest/Kconfig'
      - 'bsp/qemu-vexpress-a9/**'
      - 'bsp/qemu-virt64-aarch64/**'
      - 'bsp/qemu-virt64-riscv/**'
      - 'bsp/xuantie/virt64/c906/**'
      - 'components/**'
      - 'examples/utest/**'
      - 'include/**'
      - 'libcpu/**'
      - 'src/**'
      - 'tools/**'
      - '!**/README.md'
      - '!**/README_zh.md'
  workflow_dispatch:
    inputs:
      trigger_type:
        description: '触发类型'
        required: false
        default: 'manual'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04
    name: ${{ matrix.platform.UTEST }} :${{ matrix.config_file }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { UTEST: "A9",            RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "standard", "SMP_RUN":"" }
          - { UTEST: "A9-rtsmart",    RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "rtsmart",  "SMP_RUN":"" }
          - { UTEST: "A9-smp",        RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "standard",  "SMP_RUN":"smp" }

          - { UTEST: "RISCV",         RTT_BSP: "bsp/qemu-virt64-riscv",     QEMU_ARCH: "riscv64", QEMU_MACHINE: "virt",        SD_FILE: "None",   KERNEL: "standard", "SMP_RUN":"" }
          - { UTEST: "RISCV-rtsmart", RTT_BSP: "bsp/qemu-virt64-riscv",     QEMU_ARCH: "riscv64", QEMU_MACHINE: "virt",        SD_FILE: "None",   KERNEL: "rtsmart",  "SMP_RUN":"" }
          - { UTEST: "RISCV-smp",     RTT_BSP: "bsp/qemu-virt64-riscv",     QEMU_ARCH: "riscv64", QEMU_MACHINE: "virt",        SD_FILE: "None",   KERNEL: "standard", "SMP_RUN":"smp" }
          - { UTEST: "XUANTIE-rtsmart", RTT_BSP: "bsp/xuantie/virt64/c906", QEMU_ARCH: "riscv64", QEMU_MACHINE: "virt",        SD_FILE: "sd.bin", KERNEL: "rtsmart",  "SMP_RUN":"" }

          - { UTEST: "AARCH64",       RTT_BSP: "bsp/qemu-virt64-aarch64",   QEMU_ARCH: "aarch64", QEMU_MACHINE: "virt",        SD_FILE: "sd.bin", KERNEL: "standard",  "SMP_RUN":"" }
          - { UTEST: "AARCH64-rtsmart", RTT_BSP: "bsp/qemu-virt64-aarch64", QEMU_ARCH: "aarch64", QEMU_MACHINE: "virt",        SD_FILE: "sd.bin", KERNEL: "rtsmart",  "SMP_RUN":"" }
          - { UTEST: "AARCH64-smp",   RTT_BSP: "bsp/qemu-virt64-aarch64",   QEMU_ARCH: "aarch64", QEMU_MACHINE: "virt",        SD_FILE: "sd.bin", KERNEL: "standard",  "SMP_RUN":"smp" }

          - { UTEST: "AARCH64",       RTT_BSP: "bsp/zynqmp-a53-dfzu2eg",   QEMU_ARCH: "aarch64", QEMU_MACHINE: "xlnx-zcu102",  SD_FILE: "None", KERNEL: "standard",  "SMP_RUN":"" }
          - { UTEST: "AARCH64-rtsmart", RTT_BSP: "bsp/zynqmp-a53-dfzu2eg", QEMU_ARCH: "aarch64", QEMU_MACHINE: "xlnx-zcu102",  SD_FILE: "None", KERNEL: "rtsmart",  "SMP_RUN":"" }
          - { UTEST: "AARCH64-smp",   RTT_BSP: "bsp/zynqmp-a53-dfzu2eg",   QEMU_ARCH: "aarch64", QEMU_MACHINE: "xlnx-zcu102",  SD_FILE: "None", KERNEL: "standard",  "SMP_RUN":"smp" }

        config_file:
          - "default.cfg"

        include:
          # run kernel utest set on all QEMU boards
          - platform: { UTEST: "A9",            RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "standard", "SMP_RUN":"" }
            config_file: "kernel/kernel_basic.cfg"
          - platform: { UTEST: "A9",            RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "standard", "SMP_RUN":"" }
            config_file: "kernel/ipc.cfg"
          - platform: { UTEST: "A9",            RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "standard", "SMP_RUN":"" }
            config_file: "kernel/mem.cfg"
          - platform: { UTEST: "A9-rtsmart",    RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "rtsmart",  "SMP_RUN":"" }
            config_file: "kernel/kernel_basic.cfg"
          - platform: { UTEST: "A9-rtsmart",    RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "rtsmart",  "SMP_RUN":"" }
            config_file: "kernel/ipc.cfg"
          - platform: { UTEST: "A9-rtsmart",    RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "rtsmart",  "SMP_RUN":"" }
            config_file: "kernel/mem.cfg"
          - platform: { UTEST: "A9-smp",        RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "standard", "SMP_RUN":"smp" }
            config_file: "kernel/kernel_basic.cfg"
          - platform: { UTEST: "A9-smp",        RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "standard", "SMP_RUN":"smp" }
            config_file: "kernel/ipc.cfg"
          - platform: { UTEST: "A9-smp",        RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "standard", "SMP_RUN":"smp" }
            config_file: "kernel/mem.cfg"
          - platform: { UTEST: "RISCV",         RTT_BSP: "bsp/qemu-virt64-riscv",     QEMU_ARCH: "riscv64", QEMU_MACHINE: "virt",        SD_FILE: "None",   KERNEL: "standard", "SMP_RUN":"" }
            config_file: "kernel/kernel_basic.cfg"
          - platform: { UTEST: "RISCV",         RTT_BSP: "bsp/qemu-virt64-riscv",     QEMU_ARCH: "riscv64", QEMU_MACHINE: "virt",        SD_FILE: "None",   KERNEL: "standard", "SMP_RUN":"" }
            config_file: "kernel/ipc.cfg"
          - platform: { UTEST: "RISCV",         RTT_BSP: "bsp/qemu-virt64-riscv",     QEMU_ARCH: "riscv64", QEMU_MACHINE: "virt",        SD_FILE: "None",   KERNEL: "standard", "SMP_RUN":"" }
            config_file: "kernel/mem.cfg"
          - platform: { UTEST: "RISCV-rtsmart", RTT_BSP: "bsp/qemu-virt64-riscv",     QEMU_ARCH: "riscv64", QEMU_MACHINE: "virt",        SD_FILE: "None",   KERNEL: "rtsmart",  "SMP_RUN":"" }
            config_file: "kernel/kernel_basic.cfg"
          - platform: { UTEST: "RISCV-rtsmart", RTT_BSP: "bsp/qemu-virt64-riscv",     QEMU_ARCH: "riscv64", QEMU_MACHINE: "virt",        SD_FILE: "None",   KERNEL: "rtsmart",  "SMP_RUN":"" }
            config_file: "kernel/ipc.cfg"
          - platform: { UTEST: "RISCV-rtsmart", RTT_BSP: "bsp/qemu-virt64-riscv",     QEMU_ARCH: "riscv64", QEMU_MACHINE: "virt",        SD_FILE: "None",   KERNEL: "rtsmart",  "SMP_RUN":"" }
            config_file: "kernel/mem.cfg"
          - platform: { UTEST: "XUANTIE-rtsmart", RTT_BSP: "bsp/xuantie/virt64/c906", QEMU_ARCH: "riscv64", QEMU_MACHINE: "virt",        SD_FILE: "sd.bin", KERNEL: "rtsmart",  "SMP_RUN":"" }
            config_file: "kernel/kernel_basic.cfg"
          - platform: { UTEST: "XUANTIE-rtsmart", RTT_BSP: "bsp/xuantie/virt64/c906", QEMU_ARCH: "riscv64", QEMU_MACHINE: "virt",        SD_FILE: "sd.bin", KERNEL: "rtsmart",  "SMP_RUN":"" }
            config_file: "kernel/ipc.cfg"
          - platform: { UTEST: "XUANTIE-rtsmart", RTT_BSP: "bsp/xuantie/virt64/c906", QEMU_ARCH: "riscv64", QEMU_MACHINE: "virt",        SD_FILE: "sd.bin", KERNEL: "rtsmart",  "SMP_RUN":"" }
            config_file: "kernel/mem.cfg"
          - platform: { UTEST: "RISCV-smp",     RTT_BSP: "bsp/qemu-virt64-riscv",     QEMU_ARCH: "riscv64", QEMU_MACHINE: "virt",        SD_FILE: "None",   KERNEL: "standard", "SMP_RUN":"smp" }
            config_file: "kernel/mem.cfg"
          - platform: { UTEST: "AARCH64",       RTT_BSP: "bsp/qemu-virt64-aarch64",   QEMU_ARCH: "aarch64", QEMU_MACHINE: "virt",        SD_FILE: "sd.bin", KERNEL: "standard", "SMP_RUN":"" }
            config_file: "kernel/mem.cfg"
          - platform: { UTEST: "AARCH64-rtsmart", RTT_BSP: "bsp/qemu-virt64-aarch64", QEMU_ARCH: "aarch64", QEMU_MACHINE: "virt",        SD_FILE: "sd.bin", KERNEL: "rtsmart",  "SMP_RUN":"" }
            config_file: "kernel/mem.cfg"
          - platform: { UTEST: "AARCH64-smp",   RTT_BSP: "bsp/qemu-virt64-aarch64",   QEMU_ARCH: "aarch64", QEMU_MACHINE: "virt",        SD_FILE: "sd.bin", KERNEL: "standard", "SMP_RUN":"smp" }
            config_file: "kernel/mem.cfg"
          - platform: { UTEST: "A9",            RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "standard", "SMP_RUN":"" }
            config_file: "kernel/atomic_c11.cfg"
          - platform: { UTEST: "RISCV",         RTT_BSP: "bsp/qemu-virt64-riscv",     QEMU_ARCH: "riscv64", QEMU_MACHINE: "virt",        SD_FILE: "None",   KERNEL: "standard", "SMP_RUN":"" }
            config_file: "kernel/atomic_c11.cfg"

          - platform: { UTEST: "A9",            RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "standard", "SMP_RUN":"" }
            config_file: "cpp11/cpp11.cfg"

          - platform: { UTEST: "A9",            RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "standard", "SMP_RUN":"" }
            config_file: "components/lwip.cfg"
          - platform: { UTEST: "A9",            RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "standard", "SMP_RUN":"" }
            config_file: "components/netdev.cfg"
          - platform: { UTEST: "A9",            RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "standard", "SMP_RUN":"" }
            config_file: "components/sal.cfg"
          - platform: { UTEST: "A9",            RTT_BSP: "bsp/qemu-vexpress-a9",      QEMU_ARCH: "arm",     QEMU_MACHINE: "vexpress-a9", SD_FILE: "sd.bin", KERNEL: "standard", "SMP_RUN":"" }
            config_file: "components/dfs.cfg"

    env:
      TEST_QEMU_ARCH: ${{ matrix.platform.QEMU_ARCH }}
      TEST_QEMU_MACHINE: ${{ matrix.platform.QEMU_MACHINE }}
      TEST_BSP_ROOT: ${{ matrix.platform.RTT_BSP }}
      TEST_CONFIG_FILE: ${{ matrix.config_file }}
      TEST_SD_FILE: ${{ matrix.platform.SD_FILE }}
      UTEST_CONFIG_ROOT: .github/utest/configs
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 1

      - name: Install Tools
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get -yqq install scons qemu-system git device-tree-compiler
          pip3 install kconfiglib

      # Resolve one toolchain per matrix cell so later jobs can hit actions/cache.
      # cpp11 uses a separate cache key because it mutates toolchain headers in place.
      - name: Select toolchain
        id: toolchain
        shell: bash
        run: |
          set -euo pipefail
          ARCH="${{ matrix.platform.QEMU_ARCH }}"
          KERNEL="${{ matrix.platform.KERNEL }}"
          UTEST="${{ matrix.platform.UTEST }}"
          CFG="${{ matrix.config_file }}"

          ID=""
          URL=""
          DIR=""
          PREFIX=""
          BIN=""
          FMT=""
          NAME=""

          if [[ "$UTEST" == "XUANTIE-rtsmart" && "$ARCH" == "riscv64" && "$KERNEL" == "rtsmart" ]]; then
            ID="xuantie-900-gcc-linux-6.6.0-musl64-V3.0.2"
            URL="https://github.com/RT-Thread/toolchains-ci/releases/download/v1.9/Xuantie-900-gcc-linux-6.6.0-musl64-x86_64-V3.0.2.tar.gz"
            DIR="/opt/Xuantie-900-gcc-linux-6.6.0-musl64-x86_64-V3.0.2"
            PREFIX="riscv64-unknown-linux-musl-"
            BIN="riscv64-unknown-linux-musl-gcc"
            FMT="tar.gz"
            NAME="riscv-musl"
          elif [[ "$ARCH" == "arm" && "$KERNEL" == "standard" ]]; then
            ID="gcc-arm-none-eabi-10-2020-q4-major"
            URL="https://github.com/RT-Thread/toolchains-ci/releases/download/v1.3/gcc-arm-none-eabi-10-2020-q4-major-x86_64-linux.tar.bz2"
            DIR="/opt/gcc-arm-none-eabi-10-2020-q4-major"
            PREFIX="arm-none-eabi-"
            BIN="arm-none-eabi-gcc"
            FMT="tar.bz2"
            NAME="arm"
            if [[ "$CFG" == "cpp11/cpp11.cfg" ]]; then
              ID="${ID}-cpp11"
            fi
          elif [[ "$ARCH" == "arm" && "$KERNEL" == "rtsmart" ]]; then
            ID="arm-linux-musleabi-stable"
            URL="https://github.com/RT-Thread/toolchains-ci/releases/download/v1.7/arm-linux-musleabi_for_x86_64-pc-linux-gnu_stable.tar.bz2"
            DIR="/opt/arm-linux-musleabi_for_x86_64-pc-linux-gnu"
            PREFIX="arm-linux-musleabi-"
            BIN="arm-linux-musleabi-gcc"
            FMT="tar.bz2"
            NAME="arm-musl"
          elif [[ "$ARCH" == "riscv64" && "$KERNEL" == "standard" ]]; then
            ID="riscv64-unknown-elf-10.2.0-2020.12.8"
            URL="https://github.com/RT-Thread/toolchains-ci/releases/download/v1.4/riscv64-unknown-elf-toolchain-10.2.0-2020.12.8-x86_64-linux-ubuntu14.tar.gz"
            DIR="/opt/riscv64-unknown-elf-toolchain-10.2.0-2020.12.8-x86_64-linux-ubuntu14"
            PREFIX=""
            BIN="riscv64-unknown-elf-gcc"
            FMT="tar.gz"
            NAME="riscv"
          elif [[ "$ARCH" == "riscv64" && "$KERNEL" == "rtsmart" ]]; then
            ID="riscv64-linux-musleabi-latest"
            URL="https://github.com/RT-Thread/toolchains-ci/releases/download/v1.7/riscv64-linux-musleabi_for_x86_64-pc-linux-gnu_latest.tar.bz2"
            DIR="/opt/riscv64-linux-musleabi_for_x86_64-pc-linux-gnu"
            PREFIX="riscv64-unknown-linux-musl-"
            BIN="riscv64-unknown-linux-musl-gcc"
            FMT="tar.bz2"
            NAME="riscv-musl"
          elif [[ "$ARCH" == "aarch64" && "$KERNEL" == "standard" ]]; then
            ID="gcc-arm-10.2-2020.11-aarch64-none-elf"
            URL="https://github.com/RT-Thread/toolchains-ci/releases/download/v1.6/gcc-arm-10.2-2020.11-x86_64-aarch64-none-elf.tar.xz"
            DIR="/opt/gcc-arm-10.2-2020.11-x86_64-aarch64-none-elf"
            PREFIX="aarch64-none-elf-"
            BIN="aarch64-none-elf-gcc"
            FMT="tar.xz"
            NAME="aarch64"
          elif [[ "$ARCH" == "aarch64" && "$KERNEL" == "rtsmart" ]]; then
            ID="aarch64-linux-musleabi-stable"
            URL="https://github.com/RT-Thread/toolchains-ci/releases/download/v1.7/aarch64-linux-musleabi_for_x86_64-pc-linux-gnu_stable.tar.bz2"
            DIR="/opt/aarch64-linux-musleabi_for_x86_64-pc-linux-gnu"
            PREFIX="aarch64-linux-musleabi-"
            BIN="aarch64-linux-musleabi-gcc"
            FMT="tar.bz2"
            NAME="aarch64-musl"
          else
            echo "No valid toolchain mapping for ARCH=$ARCH KERNEL=$KERNEL UTEST=$UTEST"
            exit 1
          fi

          {
            echo "id=$ID"
            echo "url=$URL"
            echo "dir=$DIR"
            echo "prefix=$PREFIX"
            echo "bin=$BIN"
            echo "fmt=$FMT"
            echo "name=$NAME"
          } >> "$GITHUB_OUTPUT"
          echo "Selected toolchain: $ID -> $DIR"

      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@main
        with:
          path: ${{ steps.toolchain.outputs.dir }}
          key: ${{ runner.os }}-utest-tc-${{ steps.toolchain.outputs.id }}

      - name: Download toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          URL="${{ steps.toolchain.outputs.url }}"
          FMT="${{ steps.toolchain.outputs.fmt }}"
          ARCHIVE="$(basename "$URL")"
          echo "Downloading $ARCHIVE"
          wget -q "$URL" -O "$ARCHIVE"
          case "$FMT" in
            tar.bz2) sudo tar xjf "$ARCHIVE" -C /opt ;;
            tar.gz)  sudo tar xzf "$ARCHIVE" -C /opt ;;
            tar.xz)  sudo tar xf "$ARCHIVE" -C /opt ;;
            *) echo "Unknown archive format: $FMT"; exit 1 ;;
          esac
          rm -f "$ARCHIVE"

      - name: Setup toolchain
        shell: bash
        run: |
          set -euo pipefail
          DIR="${{ steps.toolchain.outputs.dir }}"
          PREFIX="${{ steps.toolchain.outputs.prefix }}"
          BIN="${{ steps.toolchain.outputs.bin }}"
          NAME="${{ steps.toolchain.outputs.name }}"
          CFG="${{ matrix.config_file }}"
          ARCH="${{ matrix.platform.QEMU_ARCH }}"
          KERNEL="${{ matrix.platform.KERNEL }}"

          if [[ ! -x "$DIR/bin/$BIN" ]]; then
            echo "Toolchain binary missing: $DIR/bin/$BIN"
            exit 1
          fi

          "$DIR/bin/$BIN" --version
          echo "RTT_EXEC_PATH=$DIR/bin" >> "$GITHUB_ENV"
          if [[ -n "$PREFIX" ]]; then
            echo "RTT_CC_PREFIX=$PREFIX" >> "$GITHUB_ENV"
          fi
          echo "TOOLCHAIN_INSTALLED=$NAME" >> "$GITHUB_ENV"

          # cpp11 mutates headers; cache key already isolates this variant.
          if [[ "$ARCH" == "arm" && "$CFG" == "cpp11/cpp11.cfg" && "$KERNEL" == "standard" ]]; then
            sudo rm -f "$DIR/arm-none-eabi/include/c++/10.2.1/thread"
            sudo rm -f "$DIR/arm-none-eabi/include/c++/10.2.1/mutex"
            sudo rm -f "$DIR/arm-none-eabi/include/c++/10.2.1/condition_variable"
            sudo rm -f "$DIR/arm-none-eabi/include/c++/10.2.1/future"
            sudo rm -f "$DIR/arm-none-eabi/include/pthread.h"
            sudo cat /dev/null > "$DIR/arm-none-eabi/include/sys/_pthreadtypes.h"
            sed -i 's/-fno-exceptions/ /g' "$TEST_BSP_ROOT/rtconfig.py"
          fi

      - name: Build BSP
        if: ${{ env.TOOLCHAIN_INSTALLED != '' && success() }}
        run: |
          # Whether plan to run SMP?
          if [[ "${{ matrix.platform.SMP_RUN }}"  == "smp" ]]; then
            cat $UTEST_CONFIG_ROOT/smp/smp.cfg >> $TEST_BSP_ROOT/.config
          fi

          # Is the kernel rtsmart?
          if [[ "${{ matrix.platform.KERNEL }}"  == "rtsmart" ]]; then
            cat $UTEST_CONFIG_ROOT/rtsmart/rtsmart.cfg >> $TEST_BSP_ROOT/.config
          fi

          echo CONFIG_RT_USING_UTESTCASES=y >> $TEST_BSP_ROOT/.config
          cat $UTEST_CONFIG_ROOT/$TEST_CONFIG_FILE >> $TEST_BSP_ROOT/.config
          scons --pyconfig-silent -C $TEST_BSP_ROOT
          scons -j$(nproc) --strict -C $TEST_BSP_ROOT

      - name: Cache Xuantie QEMU
        if: ${{ matrix.platform.UTEST == 'XUANTIE-rtsmart' && env.TOOLCHAIN_INSTALLED != '' && success() }}
        id: cache-xuantie-qemu
        uses: actions/cache@main
        with:
          path: ${{ github.workspace }}/xuantie-qemu
          key: ${{ runner.os }}-xuantie-qemu-V5.0.5-B20250108-0335

      - name: Install Xuantie QEMU
        if: ${{ matrix.platform.UTEST == 'XUANTIE-rtsmart' && env.TOOLCHAIN_INSTALLED != '' && success() && steps.cache-xuantie-qemu.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get -yqq install dos2unix libcapstone-dev libbrlapi-dev
          ARCHIVE="Xuantie-qemu-x86_64-Ubuntu-20.04-V5.0.5-B20250108-0335.tar.gz"
          wget -q "https://occ-oss-prod.oss-cn-hangzhou.aliyuncs.com/resource//1736318325160/${ARCHIVE}" -O "$ARCHIVE"
          tar xzf "$ARCHIVE"
          rm -f "$ARCHIVE"
          dos2unix ./install/qemu_post_install_small.sh
          sudo chmod +x ./install/qemu_post_install_small.sh
          sudo ./install/qemu_post_install_small.sh
          mkdir -p xuantie-qemu
          rm -rf xuantie-qemu/install
          mv install xuantie-qemu/install

      - name: Prepare Xuantie QEMU runtime
        if: ${{ matrix.platform.UTEST == 'XUANTIE-rtsmart' && env.TOOLCHAIN_INSTALLED != '' && success() }}
        shell: bash
        run: |
          set -euo pipefail
          # Shared libs are not in cache; ensure they exist on every run.
          sudo DEBIAN_FRONTEND=noninteractive apt-get -yqq install libcapstone-dev libbrlapi-dev
          if [[ ! -d xuantie-qemu/install && -d install ]]; then
            mkdir -p xuantie-qemu
            mv install xuantie-qemu/install
          fi
          QEMU_BIN="xuantie-qemu/install/bin/qemu-system-${TEST_QEMU_ARCH}"
          if [[ ! -f "$QEMU_BIN" ]]; then
            echo "ERROR: $QEMU_BIN not found."
            exit 1
          fi
          tmp_output=$(mktemp)
          ldd "$QEMU_BIN" > "$tmp_output" 2>&1 || true
          missing_libs=$(grep "not found" "$tmp_output" | awk '{print $1}' || true)
          rm -f "$tmp_output"
          for lib in $missing_libs; do
            base_lib=$(echo "$lib" | sed -E 's/\.so.*/\.so/')
            echo "Fix missing library link: $lib -> $base_lib"
            sudo ln -sfn "/usr/lib/x86_64-linux-gnu/$base_lib" "/usr/lib/x86_64-linux-gnu/$lib"
          done
          echo "XUANTIE_QEMU_BIN=$QEMU_BIN" >> "$GITHUB_ENV"

      - name: QEMU Run Test
        if: ${{ env.TOOLCHAIN_INSTALLED != '' && success() }}
        run: |
          if [ "$TEST_SD_FILE" != "None" ]; then
            dd if=/dev/zero of=$TEST_BSP_ROOT/sd.bin bs=1024 count=65536
            mkfs.fat $TEST_BSP_ROOT/sd.bin
          fi

          if [[ "${{ matrix.platform.QEMU_ARCH }}"  == "aarch64" ]]; then
            if [[ "${{ matrix.platform.QEMU_MACHINE }}"  == "virt" ]]; then
              qemu-system-$TEST_QEMU_ARCH -M virt -cpu max -smp 4 -m 128M -kernel $TEST_BSP_ROOT/rtthread.bin -nographic \
              -append "console=ttyAMA0 earlycon cma=8M coherent_pool=2M root=vda0 rootfstype=elm rootwait rw" \
              -drive if=none,file=$TEST_BSP_ROOT/sd.bin,format=raw,id=blk0 -device virtio-blk-device,drive=blk0 \
              -netdev user,id=net0 -device virtio-net-device,netdev=net0,bus=virtio-mmio-bus.1 \
              > qemu_output_$TEST_QEMU_ARCH.log  2>&1 &
            elif [[ "${{ matrix.platform.QEMU_MACHINE }}"  == "xlnx-zcu102" ]]; then
              heap=$(grep -E '^#define[[:space:]]+ARCH_HEAP_SIZE' $TEST_BSP_ROOT/rtconfig.h | awk '{print $3}')
              page=$(grep -E '^#define[[:space:]]+ARCH_INIT_PAGE_SIZE' $TEST_BSP_ROOT/rtconfig.h | awk '{print $3}')
              heap=$(echo "$heap" | tr -d '()')
              page=$(echo "$page" | tr -d '()')
              heap_val=$((heap))
              page_val=$((page))
              mem=$((heap_val + page_val))
              mem=$((128 + mem / (1024 * 1024)))
              qemu-system-$TEST_QEMU_ARCH -M xlnx-zcu102 -m $mem -kernel $TEST_BSP_ROOT/rtthread.bin -nographic \
              > qemu_output_$TEST_QEMU_ARCH.log  2>&1 &
            fi
          elif [[ "${{ matrix.platform.UTEST }}"  == "XUANTIE-rtsmart" ]]; then
            "$XUANTIE_QEMU_BIN" -cpu c906fd -M $TEST_QEMU_MACHINE -kernel $TEST_BSP_ROOT/rtthread.bin -nographic \
            -drive if=none,file=$TEST_BSP_ROOT/sd.bin,format=raw,id=blk0 -device virtio-blk-device,drive=blk0,bus=virtio-mmio-bus.0 \
            > qemu_output_$TEST_QEMU_ARCH.log  2>&1 &
          elif [[ "${{ matrix.platform.QEMU_ARCH }}"  == "arm" ]]; then
            qemu-system-$TEST_QEMU_ARCH \
                -nographic \
                -M $TEST_QEMU_MACHINE \
                -kernel $TEST_BSP_ROOT/rtthread.bin  \
                -sd $TEST_BSP_ROOT/sd.bin  \
                > qemu_output_$TEST_QEMU_ARCH.log  2>&1 &
          else
            qemu-system-$TEST_QEMU_ARCH \
                -nographic \
                -M $TEST_QEMU_MACHINE \
                -kernel $TEST_BSP_ROOT/rtthread.bin  \
                > qemu_output_$TEST_QEMU_ARCH.log  2>&1 &
          fi

          QEMU_PID=$!
          disown $QEMU_PID

      - name: Monitor qemu log
        if: ${{ env.TOOLCHAIN_INSTALLED != '' && success() }}
        timeout-minutes: 20
        run: |
          LOG_FILE="qemu_output_${TEST_QEMU_ARCH}.log"
          FAILURE_DETECTED=false
          ERROR_LOGS=""
          export FAILURE_DETECTED ERROR_LOGS

          if [[ ! -f "$LOG_FILE" ]]; then
            echo "Error: QEMU log file $LOG_FILE was not created."
            exit 1
          fi

          echo "=========================================================================================="
          echo " ||                                                                                    || "
          echo " ||                          Start automatic running of Utest                          || "
          echo " VV                                                                                    VV "
          echo "=========================================================================================="
          set +e
          timeout 20m bash -c '
            tail -n +1 -f "$1" | while IFS= read -r line; do
              echo "$line"
              if [[ "$line" == *"[  FAILED  ] [ result   ]"* ]]; then
                ERROR_LOGS="${ERROR_LOGS}${line}"$'\''\n'\''
                FAILURE_DETECTED=true
              fi

              if [[ "${line,,}" == *"assertion failed"* || "${line,,}" == *"assert failed"* ]]; then
                echo "=========================================================================================="
                echo " ||                                                                                    || "
                echo " ||              Error: Assertion failure detected in QEMU log.                       || "
                echo " VV                                                                                    VV "
                echo "=========================================================================================="
                exit 1
              fi

              if [[ "$line" == *"[==========] [ utest    ] finished"* ]]; then
                if [[ "$FAILURE_DETECTED" == "true" ]]; then
                  echo "=========================================================================================="
                  echo " ||                                                                                    || "
                  echo " ||         Error: Failures detected in logs. Below are the failure details...         || "
                  echo " VV                                                                                    VV "
                  echo "=========================================================================================="
                  echo "$ERROR_LOGS"
                  exit 1
                fi
                echo "=========================================================================================="
                echo "                  Successed: Utest run completed. Exiting log monitoring                  "
                echo "=========================================================================================="
                exit 0
              fi
            done
          ' bash "$LOG_FILE"
          monitor_status=$?
          set -e

          if [[ $monitor_status -eq 124 ]]; then
            echo "=========================================================================================="
            echo " ||                                                                                    || "
            echo " ||             Error: Utest run timed out after 20 minutes. Exiting...               || "
            echo " VV                                                                                    VV "
            echo "=========================================================================================="
            pkill -f "qemu-system-${TEST_QEMU_ARCH}.*${TEST_BSP_ROOT}/rtthread.bin" || true
            exit 1
          fi

          if [[ $monitor_status -ne 0 ]]; then
            pkill -f "qemu-system-${TEST_QEMU_ARCH}.*${TEST_BSP_ROOT}/rtthread.bin" || true
          fi

          exit $monitor_status
